name: Build Windows exe

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to embed in the exe (e.g. 1.2.3)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $v = '${{ github.ref_name }}' -replace '^v', ''
          } else {
            $v = '${{ inputs.version }}'
          }
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved version: $v"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Inject version
        shell: pwsh
        run: |
          $v = '${{ steps.version.outputs.value }}'
          Set-Content -Path smurfsniper/_version.py -Encoding utf8 -Value @(
            '# Generated by CI at build time. Do not edit by hand.',
            "__version__ = `"$v`""
          )
          Get-Content smurfsniper/_version.py

      - name: Install project and PyInstaller
        run: pip install . pyinstaller

      - name: Build exe
        run: pyinstaller --clean --noconfirm smurfsniper.spec

      - name: Verify version
        shell: pwsh
        run: ./dist/smurfsniper.exe --version

      - name: Rename exe with version
        shell: pwsh
        run: Rename-Item dist/smurfsniper.exe "smurfsniper-${{ steps.version.outputs.value }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smurfsniper-${{ steps.version.outputs.value }}-windows
          path: dist/smurfsniper-${{ steps.version.outputs.value }}.exe
          if-no-files-found: error

      - name: Create release and attach exe
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SmurfSniper ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: dist/smurfsniper-${{ steps.version.outputs.value }}.exe
          fail_on_unmatched_files: true
