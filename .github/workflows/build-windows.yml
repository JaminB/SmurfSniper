name: Build Windows exe

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to embed in the exe (e.g. 1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Inject version
        shell: pwsh
        run: |
          $v = '${{ inputs.version }}'
          Set-Content -Path smurfsniper/_version.py -Encoding utf8 -Value @(
            '# Generated by CI at build time. Do not edit by hand.',
            "__version__ = `"$v`""
          )
          Get-Content smurfsniper/_version.py

      - name: Install project and PyInstaller
        run: pip install . pyinstaller

      - name: Build exe
        run: pyinstaller --clean --noconfirm smurfsniper.spec

      - name: Verify version
        shell: pwsh
        run: ./dist/smurfsniper.exe --version

      - name: Rename exe with version
        shell: pwsh
        run: Rename-Item dist/smurfsniper.exe "smurfsniper-${{ inputs.version }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smurfsniper-${{ inputs.version }}-windows
          path: dist/smurfsniper-${{ inputs.version }}.exe
          if-no-files-found: error

      - name: Create tag and GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ inputs.version }}"
          $asset = "dist/smurfsniper-${{ inputs.version }}.exe"

          # Fail clearly if this version was already released.
          if (gh release view $tag 2>$null) {
            Write-Error "Release $tag already exists. Pick a new version."
            exit 1
          }

          # Tag the triggering commit, auto-summarize changes since the last
          # release, and attach the exe.
          $createArgs = @(
            "release", "create", $tag, $asset,
            "--title", $tag,
            "--generate-notes",
            "--target", "${{ github.sha }}"
          )
          if ("${{ inputs.prerelease }}" -eq "true") { $createArgs += "--prerelease" }

          gh @createArgs
